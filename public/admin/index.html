<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo | João Paulo Esmeraldo</title>
    <!-- Force absolute path loading for config.yml to prevent trailing-slash routing issues -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <!-- Custom editorial branding styles for Decap CMS -->
    <link rel="stylesheet" href="/admin/cms.css" />
    <!-- Load Quill WYSIWYG stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Include the Decap CMS JavaScript package & PT-BR Locale -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://unpkg.com/decap-cms-locales@^1.0.0/dist/pt.js"></script>
    <!-- Load Quill WYSIWYG Script library -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    
    <script>
      // Register custom Quill rich text editor widget
      const QuillControl = createClass({
        // Prevent React from ever updating or reconciling this component's DOM after mounting.
        // This is critical to prevent React virtual DOM conflicts with Quill's direct DOM manipulations.
        shouldComponentUpdate: function() {
          return false;
        },
        handleChange: function(value) {
          this.props.onChange(value);
        },
        componentDidMount: function() {
          const container = this.quillContainer;
          if (!container) return;
          
          // Configure toolbar options including fonts, alignment, sizes, formatting
          const quill = new Quill(container, {
            theme: 'snow',
            modules: {
              toolbar: [
                [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'blockquote', 'code-block'],
                ['clean']
              ]
            }
          });
          
          this.quill = quill;
          
          // Inject initial content
          if (this.props.value) {
            quill.clipboard.dangerouslyPasteHTML(this.props.value);
          }
          
          // Send updates back to Decap CMS state
          quill.on('text-change', () => {
            const editorEl = container.querySelector('.ql-editor');
            const html = editorEl ? editorEl.innerHTML : '';
            if (html !== this.props.value) {
              this.handleChange(html);
            }
          });
        },
        render: function() {
          return h('div', {
            style: { border: '1px solid #e2e2e7', borderRadius: '4px', background: '#ffffff' }
          }, 
            h('div', {
              ref: (node) => { this.quillContainer = node; },
              style: { minHeight: '220px' }
            })
          );
        }
      });

      const QuillPreview = createClass({
        render: function() {
          const val = this.props.value || '';
          const htmlContent = (typeof val === 'string') ? val : (val.toString ? val.toString() : '');
          return h('div', {
            style: { padding: '10px' },
            dangerouslySetInnerHTML: { __html: htmlContent }
          });
        }
      });

      // Register the widget in Decap CMS
      if (window.CMS) {
        window.CMS.registerWidget('quill', QuillControl, QuillPreview);
        
        // Register Portuguese Locale dictionary
        window.CMS.registerLocale('pt', {
          auth: {
            login: 'Entrar',
            loggingIn: 'Entrando...',
            loginWithGitHub: 'Entrar com GitHub',
            errors: {
              auth: 'Ocorreu um erro ao tentar autenticar.',
            },
          },
          app: {
            header: {
              content: 'Conteúdo',
              workflow: 'Fluxo de Trabalho',
              media: 'Mídia',
              quickAdd: 'Adicionar rápido',
            },
            app: {
              errorHeader: 'Erro ao carregar o painel',
              configRequired: 'A configuração do CMS é obrigatória.',
              loadingConfig: 'Carregando...',
            },
          },
          collection: {
            sidebar: {
              collections: 'Coleções',
              searchAll: 'Pesquisar',
            },
            collectionTop: {
              sortBy: 'Ordenar por',
              viewAs: 'Exibir como',
              newButton: 'Novo %{collectionLabel}',
            },
            entries: {
              emptyCollection: 'Nenhum item cadastrado',
              loadingEntries: 'Carregando...',
            },
          },
          editor: {
            editorToolbar: {
              publishing: 'Publicando...',
              publish: 'Publicar',
              published: 'Publicado',
              changesSaved: 'Alterações salvas',
              draft: 'Rascunho',
            },
          },
        });
      }

      // DOM Watcher to inject secure logout button next to the avatar
      setInterval(() => {
        const header = document.querySelector('[class*="AppHeaderContent"]');
        if (header && !document.getElementById('custom-secure-logout')) {
          const userMenu = header.querySelector('button[class*="AppHeaderUser"]');
          if (userMenu) {
            const logoutBtn = document.createElement('button');
            logoutBtn.id = 'custom-secure-logout';
            logoutBtn.className = 'custom-logout-btn';
            logoutBtn.innerText = 'Sair em segurança';
            logoutBtn.onclick = function() {
              if (confirm('Tem certeza de que deseja encerrar sua sessão com segurança?')) {
                localStorage.removeItem('decap-cms-user');
                localStorage.removeItem('netlify-cms-user');
                sessionStorage.clear();
                window.location.reload();
              }
            };
            userMenu.parentNode.insertBefore(logoutBtn, userMenu);
          }
        }
      }, 1000);
    </script>
  </body>
</html>
