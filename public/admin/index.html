<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo | João Paulo Esmeraldo</title>
    <!-- Force absolute path loading for config.yml to prevent trailing-slash routing issues -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <!-- Custom editorial branding styles for Decap CMS -->
    <link rel="stylesheet" href="/admin/cms.css" />
  </head>
  <body>
    <!-- Include the Decap CMS JavaScript package -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (window.CMS) {
        window.CMS.registerLocale('pt', {
          auth: {
            login: 'Entrar',
            loggingIn: 'Entrando...',
            loginWithGitHub: 'Entrar com GitHub',
            errors: {
              auth: 'Ocorreu um erro ao tentar autenticar.',
            },
          },
          app: {
            header: {
              content: 'Conteúdo',
              workflow: 'Fluxo de Trabalho',
              media: 'Mídia',
              quickAdd: 'Adicionar rápido',
            },
            app: {
              errorHeader: 'Erro ao carregar o painel',
              configRequired: 'A configuração do CMS é obrigatória.',
              loadingConfig: 'Carregando...',
            },
          },
          collection: {
            sidebar: {
              collections: 'Coleções',
              searchAll: 'Pesquisar',
            },
            collectionTop: {
              sortBy: 'Ordenar por',
              viewAs: 'Exibir como',
              newButton: 'Novo %{collectionLabel}',
            },
            entries: {
              emptyCollection: 'Nenhum item cadastrado',
              loadingEntries: 'Carregando...',
            },
          },
          editor: {
            editorToolbar: {
              publishing: 'Publicando...',
              publish: 'Publicar',
              published: 'Publicado',
              changesSaved: 'Alterações salvas',
              draft: 'Rascunho',
            },
          },
        });
      }

      // DOM Watcher to inject secure logout button next to the avatar
      setInterval(() => {
        const header = document.querySelector('[class*="AppHeaderContent"]');
        if (header && !document.getElementById('custom-secure-logout')) {
          const userMenu = header.querySelector('button[class*="AppHeaderUser"]');
          if (userMenu) {
            const logoutBtn = document.createElement('button');
            logoutBtn.id = 'custom-secure-logout';
            logoutBtn.className = 'custom-logout-btn';
            logoutBtn.innerText = 'Sair em segurança';
            logoutBtn.onclick = function() {
              if (confirm('Tem certeza de que deseja encerrar sua sessão com segurança?')) {
                localStorage.removeItem('decap-cms-user');
                localStorage.removeItem('netlify-cms-user');
                sessionStorage.clear();
                window.location.reload();
              }
            };
            userMenu.parentNode.insertBefore(logoutBtn, userMenu);
          }
        }
      }, 1000);
    </script>
  </body>
</html>
